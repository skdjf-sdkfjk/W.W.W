<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WWW.exe</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
background:#000;
color:#00ff88;
font-family:"Courier New",monospace;
height:100vh;
overflow:hidden;
}

body:after{
content:"";
position:fixed;
inset:0;
background:repeating-linear-gradient(
0deg,
rgba(0,255,120,.05),
rgba(0,255,120,.05) 1px,
transparent 2px,
transparent 4px);
pointer-events:none;
}

.window{
width:90%;
height:85%;
margin:5vh auto;
border:2px solid #00ff88;
background:#050505;
box-shadow:0 0 20px #00ff88;
}

.title{
background:#00ff88;
color:#000;
padding:8px;
font-weight:bold;
}

.menu{
padding:10px;
border-bottom:1px solid #00ff88;
}

.menu span{
margin-right:20px;
cursor:pointer;
}

.desktop{
display:flex;
height:90%;
}

.files{
width:25%;
border-right:1px solid #00ff88;
padding:20px;
}

.folder{
margin:20px 0;
cursor:pointer;
}

.folder:hover{
color:white;
}

.screen{
flex:1;
padding:30px;
}

.logo{
font-size:50px;
font-weight:bold;
animation:glitch 1s infinite;
}

.box{
border:1px solid #00ff88;
padding:20px;
margin-top:20px;
}

button{
background:#000;
color:#00ff88;
border:1px solid #00ff88;
padding:10px;
cursor:pointer;
}

button:hover{
background:#00ff88;
color:#000;
}

@keyframes glitch{
0%{text-shadow:2px 0 red}
50%{text-shadow:-2px 0 blue}
100%{text-shadow:2px 0 red}
}

.error{
color:red;
display:none;
}

</style>
</head>

<body>

<div class="window">

<div class="title">
WWW.exe - World Wide Web
</div>

<div class="menu">
<span>FILE</span>
<span>EDIT</span>
<span>VIEW</span>
<span>SYSTEM</span>
<span>HELP</span>
</div>


<div class="desktop">

<div class="files">

<div class="folder" onclick="profile()">
📁 PROFILE
</div>

<div class="folder" onclick="world()">
📁 WORLD
</div>

<div class="folder" onclick="archive()">
📁 ARCHIVE
</div>

<div class="folder" onclick="secret()">
📁 SECRET
</div>

</div>


<div class="screen">

<div class="logo">
WWW
</div>

<p>
WORLD WIDE WEB SYSTEM
</p>

<div class="box" id="content">

STATUS : ONLINE<br>
SIGNAL : 0%<br>
VERSION : WWW_2026.exe

<br><br>

Please select a folder.

</div>


</div>

</div>

</div>


<script>

let content=document.getElementById("content");


function profile(){

content.innerHTML=`

<h2>PROFILE.exe</h2>

GROUP : BmyV<br><br>

STATUS : ONLINE<br><br>

MEMBERS<br>
----------------<br>

● CHAENARAM<br>
● LEEWOOBIN<br>
● SINGAEUN<br>
● NAMWOOHYEON<br><br>

MISSION<br>

Connecting another world
through music.

`;

}


function world(){

content.innerHTML=`

<h2>WORLD.txt</h2>

Access the Forbidden Future.<br><br>

Overcome the Glitch.<br><br>

Those signals became a new world.<br><br>

<b>WORLD WIDE WEB</b>

`;

}


function archive(){

content.innerHTML=`

<h2>archive.log</h2>

[2026.07.23]<br><br>

Connection Established...<br><br>

Loading Database...<br><br>

Found : 4 Members<br><br>

System Stable.

`;

}


function secret(){

content.innerHTML=`

<h2>ACCESS ERROR</h2>

<span class="error">
ERROR CODE : 404
</span>

<br><br>

Unauthorized user detected.

`;

document.querySelector(".error").style.display="block";

}


</script>

</body>
</html>
